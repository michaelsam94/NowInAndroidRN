# Build a demo release APK and attach it to a GitHub Release when you push a version tag.
#
# Create and push a tag:
#   git tag v0.0.1
#   git push origin v0.0.1
#
# Tag must match v* (e.g. v0.0.1, v1.2.0). APK is signed with the debug keystore
# (see android/app/build.gradle) — suitable for QA; use EAS + a release keystore for Play Store.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-release-apk:
    name: Android demo APK → GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint and typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        id: build
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.version }}
        run: |
          chmod +x .github/scripts/build-android-apk.sh
          .github/scripts/build-android-apk.sh release
          mkdir -p dist/apk
          cp android/app/build/outputs/apk/release/app-release.apk \
            "dist/apk/NowInAndroidRN-demo-${{ steps.version.outputs.tag }}.apk"
          echo "apk_file=dist/apk/NowInAndroidRN-demo-${{ steps.version.outputs.tag }}.apk" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Now in Android RN ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.apk_file }}
          body: |
            ## Install (Android demo)

            - **Package:** `com.nowinandroidrn.demo`
            - **Flavor:** demo (bundled offline JSON feed)
            - **Signing:** debug keystore (QA / sideload only)

            Download **`NowInAndroidRN-demo-${{ steps.version.outputs.tag }}.apk`**, enable “Install unknown apps” if needed, and open the APK on a device or emulator.

            ```bash
            adb install -r NowInAndroidRN-demo-${{ steps.version.outputs.tag }}.apk
            ```

            For Play Store or production signing, use [EAS Build](https://docs.expo.dev/build/introduction/) (`npm run build:demo` / `build:prod`).
