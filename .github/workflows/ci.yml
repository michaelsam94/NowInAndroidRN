name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Only cancel in-flight PR runs; rapid pushes to main were aborting long Gradle jobs.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

  android-demo-assemble:
    name: Android demo APK (Gradle)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: |
          npx expo prebuild --platform android --no-install
          # Prebuild adds WebP icons but leaves legacy PNGs in a committed android/ tree.
          find android/app/src/main/res/mipmap-* -type f \( -name 'ic_launcher.png' -o -name 'ic_launcher_round.png' \) -delete

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Assemble debug APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
        run: |
          cd android
          ./gradlew :app:assembleDebug --no-daemon --build-cache

  e2e-maestro:
    name: Maestro E2E (Android demo)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: |
          npx expo prebuild --platform android --no-install
          find android/app/src/main/res/mipmap-* -type f \( -name 'ic_launcher.png' -o -name 'ic_launcher_round.png' \) -delete

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 3072M
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-metrics
          disable-animations: true
          script: |
            # android-emulator-runner invokes /bin/sh (dash); pipefail is bash-only.
            set -eu
            cd android
            ./gradlew :app:assembleDebug :app:installDebug -PreactNativeArchitectures=x86_64 --no-daemon --build-cache
            adb wait-for-device
            adb shell pm list packages | grep nowinandroid
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            cd ..
            maestro test e2e/flows --config e2e/config.yaml

  eas-demo-build:
    name: EAS demo build (Android)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify EAS secrets
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          if [ -z "$EAS_PROJECT_ID" ]; then
            echo "::error::Add repository secret EAS_PROJECT_ID. Run 'eas init' locally, then copy the project ID from expo.dev or extra.eas.projectId in app.config."
            exit 1
          fi

      - name: Trigger EAS demo APK build
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: eas build --platform android --profile demo --non-interactive --no-wait
