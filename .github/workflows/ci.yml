name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Only cancel in-flight PR runs; rapid pushes to main were aborting long Gradle jobs.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

  android-demo-assemble:
    name: Android demo APK (Gradle)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Assemble debug APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
        run: |
          cd android
          ./gradlew :app:assembleDebug --no-daemon --build-cache

  e2e-maestro:
    name: Maestro E2E (Android demo)
    runs-on: macos-latest
    needs: lint-and-test
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          ram-size: 4096M
          emulator-boot-timeout: 600
          disable-animations: true
          script: |
            set -euo pipefail
            adb kill-server 2>/dev/null || true
            adb start-server
            cd android
            ./gradlew :app:assembleDebug :app:installDebug -PreactNativeArchitectures=arm64-v8a --no-daemon --build-cache
            adb shell pm list packages | grep nowinandroid
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            cd ..
            maestro test e2e/flows --config e2e/config.yaml

  eas-demo-build:
    name: EAS demo build (Android)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify EAS secrets
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          if [ -z "$EAS_PROJECT_ID" ]; then
            echo "::error::Add repository secret EAS_PROJECT_ID. Run 'eas init' locally, then copy the project ID from expo.dev or extra.eas.projectId in app.config."
            exit 1
          fi

      - name: Trigger EAS demo APK build
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: eas build --platform android --profile demo --non-interactive --no-wait
