name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

  android-demo-assemble:
    name: Android demo APK (Gradle)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: npx expo prebuild --platform android --no-install

      - name: Assemble debug APK
        run: |
          cd android
          ./gradlew :app:assembleDebug --no-daemon

  e2e-maestro:
    name: Maestro E2E (Android demo)
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android (demo flavor)
        env:
          EXPO_PUBLIC_FLAVOR: demo
        run: npx expo prebuild --platform android --no-install

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64
          ram-size: 4096M
          emulator-boot-timeout: 600
          disable-animations: true
          script: |
            set -euo pipefail
            adb kill-server 2>/dev/null || true
            adb start-server
            cd android
            ./gradlew :app:assembleDebug :app:installDebug -PreactNativeArchitectures=arm64-v8a --no-daemon
            adb shell pm list packages | grep nowinandroid
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH:$HOME/.maestro/bin"
            cd ..
            maestro test e2e/flows --config e2e/config.yaml

  eas-demo-build:
    name: EAS demo build (Android)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Skip EAS (no EXPO_TOKEN)
        if: ${{ secrets.EXPO_TOKEN == '' }}
        run: echo "EXPO_TOKEN secret is not set; skipping EAS build."

      - name: Setup EAS
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: npm ci --legacy-peer-deps

      - name: Trigger EAS demo APK build
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: eas build --platform android --profile demo --non-interactive --no-wait
