appId: com.nowinandroidrn.demo
---
- launchApp:
    clearState: true
- runFlow: ../subflows/wait-for-foryou-feed.yaml
- tapOn:
    id: nav:search
- extendedWaitUntil:
    visible:
      id: search:input
    timeout: 10000
- tapOn:
    id: search:input
- inputText: Compose
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: search:results
    timeout: 15000
- scrollUntilVisible:
    element:
      id: search:results
    direction: DOWN
    timeout: 10000
- tapOn:
    id: news-resource-bookmark
    below:
      id: search:results
- pressKey: Back
- tapOn:
    id: tab:bookmarks
- extendedWaitUntil:
    visible:
      id: bookmarks:feed
    timeout: 10000
- assertVisible:
    id: bookmarks:feed
