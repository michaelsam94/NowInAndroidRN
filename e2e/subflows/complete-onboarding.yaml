appId: com.nowinandroidrn.demo
---
# Bootstrap may already follow topics 1–3 and hide onboarding; do not tap topicTag:1
# (that would unfollow an already-followed chip).
- runFlow:
    when:
      visible:
        id: foryou:onboarding
    commands:
      - tapOn:
          id: foryou:onboarding-done
      - extendedWaitUntil:
          notVisible:
            id: foryou:onboarding
          timeout: 15000
